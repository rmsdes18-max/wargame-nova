<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WARTL Playground</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/nova.css">
<style>
  /* Override shell layout — playground is a simple scrollable page */
  body { background: #0f0f0f; padding: 0; }
  .pg-wrap { max-width: 820px; margin: 0 auto; padding: 32px 24px 64px; }

  /* Header */
  .pg-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
  .pg-title { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700; color: #fff; }
  .pg-title span { color: var(--accent-primary); }
  .pg-back { font-size: 13px; color: var(--text-secondary); text-decoration: none; }
  .pg-back:hover { color: #fff; }

  /* Section */
  .pg-section { margin-bottom: 40px; }
  .pg-section-title {
    font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .08em;
    color: var(--text-muted); margin-bottom: 14px;
    border-bottom: 1px solid var(--border-subtle); padding-bottom: 8px;
  }

  /* Inline flex row for badges */
  .pg-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  /* Make modal static for preview */
  .pg-modal-static .modal-overlay {
    position: relative; inset: auto; display: flex;
    background: transparent; z-index: auto;
  }

  /* Dropdown wrapper */
  .pg-dropdown {
    position: relative; display: inline-block;
  }
  .pg-dropdown-toggle {
    background: var(--bg-tertiary); border: 1px solid var(--border-default);
    color: var(--text-primary); border-radius: 6px; padding: 7px 14px;
    cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px;
  }
  .pg-dropdown-toggle:hover { background: var(--bg-hover); }
  .pg-dropdown-menu {
    position: absolute; top: calc(100% + 4px); left: 0;
    background: var(--bg-secondary); border: 1px solid var(--border-default);
    border-radius: 8px; padding: 4px; min-width: 180px;
    box-shadow: 0 8px 24px rgba(0,0,0,.5); z-index: 10;
  }
  .pg-dropdown-item {
    padding: 7px 10px; border-radius: 5px; font-size: 12px;
    font-weight: 600; color: var(--text-primary); cursor: pointer;
    display: flex; align-items: center; gap: 8px;
  }
  .pg-dropdown-item:hover { background: var(--bg-tertiary); }
  .pg-dropdown-item.danger { color: var(--danger); }
</style>
</head>
<body>

<div class="pg-wrap">

  <!-- ── HEADER ──────────────────────────────────────────── -->
  <div class="pg-header">
    <div class="pg-title"><span>WARTL</span> Playground</div>
    <a class="pg-back" href="index.html">&larr; Back to App</a>
  </div>

  <!-- ── 1. ROLE BADGES ──────────────────────────────────── -->
  <div class="pg-section">
    <div class="pg-section-title">RoleBadge</div>
    <div class="pg-row" id="rolebadge-demo"></div>
  </div>

  <!-- ── 2. PARTY CARD ───────────────────────────────────── -->
  <div class="pg-section">
    <div class="pg-section-title">PartyCard</div>
    <div style="max-width:380px;" id="partycard-demo"></div>
  </div>

  <!-- ── 3. MEMBER DROPDOWN ──────────────────────────────── -->
  <div class="pg-section">
    <div class="pg-section-title">MemberDropdown</div>
    <div id="dropdown-demo"></div>
  </div>

  <!-- ── 4. STATS ROW ────────────────────────────────────── -->
  <div class="pg-section">
    <div class="pg-section-title">StatsRow</div>
    <div id="statsrow-demo"></div>
  </div>

  <!-- ── 5. MODAL ────────────────────────────────────────── -->
  <div class="pg-section">
    <div class="pg-section-title">Modal</div>
    <div class="pg-modal-static" id="modal-demo"></div>
  </div>

  <!-- ── 6. TOAST ────────────────────────────────────────── -->
  <div class="pg-section">
    <div class="pg-section-title">Toast</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="pg-dropdown-toggle" onclick="Toast.success('War saved successfully!')">Success</button>
      <button class="pg-dropdown-toggle" onclick="Toast.error('Failed to save war')">Error</button>
      <button class="pg-dropdown-toggle" onclick="Toast.warning('CSV is empty')">Warning</button>
      <button class="pg-dropdown-toggle" onclick="Toast.info('3 new aliases saved')">Info</button>
    </div>
  </div>

</div>

<script src="js/components/role-badge.js"></script>
<script src="js/components/stats-row.js"></script>
<script src="js/components/party-card.js"></script>
<script src="js/components/member-dropdown.js"></script>
<script src="js/components/modal.js"></script>
<script src="js/components/toast.js"></script>
<script>
  // escHtml stub for playground (provided by index.html in production)
  if (typeof escHtml === 'undefined') {
    window.escHtml = function(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); };
  }
</script>
<script>
  document.getElementById('rolebadge-demo').innerHTML =
    '<div style="display:flex;align-items:center;gap:6px;">' + RoleBadge('DPS') + '</div>'
    + '<div style="display:flex;align-items:center;gap:6px;">' + RoleBadge('TANK') + '</div>'
    + '<div style="display:flex;align-items:center;gap:6px;">' + RoleBadge('HEALER') + '</div>'
    + '<br><br><strong style="color:var(--text-muted);font-size:12px;">Small:</strong> '
    + '<div style="display:flex;align-items:center;gap:6px;">' + RoleBadge('DPS', { size: 'small' }) + '</div>'
    + '<div style="display:flex;align-items:center;gap:6px;">' + RoleBadge('TANK', { size: 'small' }) + '</div>'
    + '<br><br><strong style="color:var(--text-muted);font-size:12px;">Clickable:</strong> '
    + '<div style="display:flex;align-items:center;gap:6px;">' + RoleBadge('DPS', { clickable: true }) + '</div>'
    + '<br><br><strong style="color:var(--text-muted);font-size:12px;">Inline variant:</strong> '
    + RoleBadge.inline('DPS') + ' '
    + RoleBadge.inline('TANK') + ' '
    + RoleBadge.inline('HEALER');
</script>
<script>
  var demoStats = { defeat: 42, assist: 73, dmg_dealt: 3100000, dmg_taken: 890000, healed: 15000 };
  document.getElementById('statsrow-demo').innerHTML =
    '<strong style="color:var(--text-muted);font-size:12px;">Cards (default):</strong>'
    + StatsRow(demoStats)
    + '<br><strong style="color:var(--text-muted);font-size:12px;">Compact cards:</strong>'
    + StatsRow(demoStats, { compact: true, fields: ['kills','assists','dmg_dealt','healed'] })
    + '<br><strong style="color:var(--text-muted);font-size:12px;">Inline:</strong><br>'
    + '<span style="font-family:monospace;font-size:12px;color:var(--text-secondary);">' + StatsRow.inline(demoStats) + '</span>'
    + '<br><br><strong style="color:var(--text-muted);font-size:12px;">Inline colored:</strong><br>'
    + '<span style="font-family:monospace;font-size:12px;">' + StatsRow.inline(demoStats, { colored: true }) + '</span>'
    + '<br><br><strong style="color:var(--text-muted);font-size:12px;">Summary totals:</strong>'
    + StatsRow.summary({ defeat: 420, assist: 730, dmg_dealt: 31000000, healed: 1500000 });
</script>
<script>
  var demoParty = {
    name: 'Alpha Squad', label: 'Party 1',
    members: [
      { name: 'Darkblade',  role: 'TANK',   defeat: 12, assist: 30, dmg_dealt: 540000,  healed: 0 },
      { name: 'Lumina',     role: 'HEALER', defeat: 3,  assist: 45, dmg_dealt: 180000,  healed: 820000 },
      { name: 'Shadowfang', role: 'DPS',    defeat: 18, assist: 22, dmg_dealt: 1200000, healed: 0 },
      { name: 'Pyrostorm',  role: 'DPS',    defeat: 7,  assist: 33, dmg_dealt: 890000,  healed: 0 }
    ]
  };
  var sm3Lookup = {};
  demoParty.members.forEach(function(m){ sm3Lookup[m.name] = m; });
  var sm3Result = PartyCard(demoParty, {
    variant: 'sm3', partyIndex: 0, dotColor: '#7c3aed',
    memberStatsLookup: sm3Lookup, newMembers: { Pyrostorm: true }
  });
  document.getElementById('partycard-demo').innerHTML =
    '<strong style="color:var(--text-muted);font-size:12px;">Simple variant:</strong>'
    + PartyCard(demoParty)
    + '<br><strong style="color:var(--text-muted);font-size:12px;">With stats:</strong>'
    + PartyCard(demoParty, { showStats: true })
    + '<br><strong style="color:var(--text-muted);font-size:12px;">SM3 variant (match preview):</strong>'
    + sm3Result.html;
</script>
<script>
  document.getElementById('dropdown-demo').innerHTML =
    '<strong style="color:var(--text-muted);font-size:12px;">Default (closed):</strong><br><br>'
    + MemberDropdown({
        memberName: 'Darkblade', currentRole: 'TANK',
        parties: [{ name: 'Party 2', index: 1 }],
        onRoleChange: "Toast.info('Set role to {role}')",
        onMove: "Toast.info('Moved to party {partyIndex}')",
        onRemove: "Toast.warning('Removed from war')"
      })
    + '<br><br><strong style="color:var(--text-muted);font-size:12px;">Open:</strong><br><br>'
    + MemberDropdown({
        memberName: 'Lumina', currentRole: 'HEALER',
        parties: [{ name: 'Party 1', index: 0 }, { name: 'Party 3', index: 2 }],
        open: true
      });
</script>
<script>
  document.getElementById('modal-demo').innerHTML = Modal({
    title: 'Paste Party Data',
    subtitle: 'Paste the scoreboard text or party list below. Click Parse to preview.',
    body: '<textarea class="modal-textarea" readonly>Darkblade    TANK    K:12  A:30  D:540K  H:0\nLumina       HEALER  K:3   A:45  D:180K  H:820K\nShadowfang   DPS     K:18  A:22  D:1.2M  H:0\nPyrostorm    DPS     K:7   A:33  D:890K  H:0</textarea>',
    footer: '<button class="btn-modal-parse">Parse</button>'
      + '<button class="btn-modal-apply ready">Apply</button>'
      + '<button class="btn-modal-cancel">Cancel</button>',
    open: true
  });
</script>
</body>
</html>
