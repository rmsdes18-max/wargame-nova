<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wartl — Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/nova.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg-primary);}
.login-card{background:var(--bg-secondary);border:1px solid var(--border-subtle);border-radius:12px;padding:40px;width:min(400px,90vw);text-align:center;}
.login-card h1{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--accent-primary);margin-bottom:4px;}
.login-card .sub{font-size:12px;color:var(--text-muted);margin-bottom:28px;}
.login-field{width:100%;background:var(--bg-tertiary);border:1px solid var(--border-subtle);border-radius:8px;padding:12px 16px;color:var(--text-primary);font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;outline:none;margin-bottom:12px;transition:border-color .15s;}
.login-field:focus{border-color:var(--accent-primary);}
.login-btn{width:100%;padding:12px;background:var(--accent-primary);color:#1a1b1e;border:none;border-radius:8px;font-size:14px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:opacity .15s;margin-top:4px;}
.login-btn:hover{opacity:.88;}
.login-error{color:#e84040;font-size:12px;margin-top:12px;display:none;}
.login-success{color:var(--heal);font-size:12px;margin-top:12px;display:none;}
</style>
</head>
<body>

<div class="login-card">
  <h1>WARTL</h1>
  <div class="sub">Admin Login</div>

  <input id="admin-user" class="login-field" type="text" placeholder="Username" autofocus>
  <input id="admin-pass" class="login-field" type="password" placeholder="Password">
  <button class="login-btn" onclick="doLogin()">Login</button>

  <div id="login-error" class="login-error"></div>
  <div id="login-success" class="login-success"></div>
</div>

<script>
document.getElementById('admin-pass').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });

async function doLogin(){
  var user = document.getElementById('admin-user').value.trim();
  var pass = document.getElementById('admin-pass').value;
  var errEl = document.getElementById('login-error');
  var okEl = document.getElementById('login-success');
  errEl.style.display='none'; okEl.style.display='none';

  if(!user || !pass){ errEl.textContent='Enter username and password'; errEl.style.display='block'; return; }

  try{
    var r = await fetch('/api/auth/admin', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:user, password:pass})
    });
    var data = await r.json();
    if(!r.ok){ errEl.textContent=data.error||'Invalid credentials'; errEl.style.display='block'; return; }

    // Save token
    localStorage.setItem('nova_token', data.token);
    localStorage.setItem('nova_admin_secret', pass);
    okEl.textContent='Login successful! Redirecting...';
    okEl.style.display='block';
    setTimeout(function(){ window.location.href='/'; }, 800);
  } catch(e){
    errEl.textContent='Connection error: '+e.message;
    errEl.style.display='block';
  }
}
</script>

</body>
</html>
